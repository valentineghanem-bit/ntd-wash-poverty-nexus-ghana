name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: python analysis/build_master.py && python analysis/build_ntd_anchor.py
      - run: python analysis/build_data_dictionary.py
      - run: python -m py_compile analysis/*.py
      - run: python -c "import pandas as pd; d=pd.read_csv('data/processed/district_modeling_261.csv'); assert len(d)==261 and d.isna().sum().sum()==0, 'data integrity fail'; print('CI data integrity OK: 261 districts, 0 missing')"
