name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile all analysis scripts
        run: python -m py_compile analysis/*.py qa/*.py
      - name: Rebuild master + anchor + dictionary
        run: |
          python analysis/build_master.py
          python analysis/build_ntd_anchor.py
          python analysis/build_data_dictionary.py
      - name: Data integrity check
        run: python -c "import pandas as pd; d=pd.read_csv('data/processed/district_modeling_261.csv'); assert len(d)==261 and int(d.isna().sum().sum())==0, 'data integrity fail'; print('CI OK: 261 districts, 0 missing')"
